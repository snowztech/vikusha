name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64
          do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            name="vikusha-${os}-${arch}"
            out="dist/${name}${ext}"
            GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "$out" \
              ./cmd/vikusha
          done

          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
